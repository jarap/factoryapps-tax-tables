name: Update tax tables from ARCA

on:
  schedule:
    # Lunes 09:00 UTC (06:00 AR). Chequeo semanal.
    - cron: '0 9 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install deps
        run: pip install -r scraper/requirements.txt

      - name: Run scrapers
        id: scrape
        run: |
          python scraper/build_tax_tables.py
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Commit if changed
        run: |
          if ! git diff --quiet data/tax_tables.json; then
            git config user.name "factoryapps-bot"
            git config user.email "factoryapps-bot@users.noreply.github.com"
            git add data/tax_tables.json
            git commit -m "chore: update tax tables from ARCA ($(date -u +%Y-%m-%d))"
            git push
            echo "committed=true" >> "$GITHUB_ENV"
          else
            echo "No changes."
          fi

      - name: Open issue on scraper failure
        if: steps.scrape.outcome == 'failure' || steps.scrape.outputs.exit_code == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Scraper falló: ${new Date().toISOString().slice(0,10)}`;
            const body = `El workflow de actualización de tablas fiscales falló.\n\n` +
                         `Revisar: ${context.payload.repository.html_url}/actions/runs/${context.runId}\n\n` +
                         `Probable causa: ARCA cambió el HTML. Revisar \`scraper/scrape_monotributo.py\`.`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['scraper-broken'],
            });
